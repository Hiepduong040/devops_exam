version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: rikkei_prod
    environment:
      POSTGRES_DB: rikkei_prod
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app_network
    restart: unless-stopped
    # Không expose port 5432 ra ngoài Internet
    ports: []

  backend:
    image: ${DOCKER_USERNAME:-rikkei}/rikkei-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    depends_on:
      - db
    networks:
      - app_network
    restart: unless-stopped

  frontend:
    image: ${DOCKER_USERNAME:-rikkei}/rikkei-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    networks:
      - app_network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app_network
    restart: unless-stopped

networks:
  app_network:
    driver: bridge

volumes:
  pgdata:
